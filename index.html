<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BOULANGERIE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TITRE -->
    <header>
        <h1>BOULANGERIE</h1>
        <button id="retour" onclick="retour()">← retour</button>
    </header>

    <!-- CONTENU -->
    <main id="contenu">

        <!-- MENU PRINCIPAL -->
        <div class="menu" id="menuPrincipal">
            <button onclick="afficherCategorie('pain')">pain</button>
            <button onclick="afficherCategorie('patisserie')">pâtisserie</button>
            <button onclick="afficherCategorie('boisson')">boisson</button>
        </div>

        <!-- PRODUITS -->
        <div id="produits" class="hidden"></div>

        <!-- RESERVATION -->
        <div id="reservation" class="hidden">
            <h2 id="produitChoisi"></h2>

            <input type="date">

            <select>
                <option>9h - 12h</option>
                <option>12h - 15h</option>
                <option>15h - 18h</option>
            </select>

            <button onclick="validerReservation()">valider</button>
        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>contact : contact@boulangerie.fr</p>
        <p>téléphone : 06 12 34 56 78</p>
    </footer>

<script>
let etape = "menu";

const data = {
    pain: [
        { nom: "pain complet", img: "images/pain_complet.jpg" },
        { nom: "pain", img: "images/pain.jpg" },
        { nom: "pain aux graines", img: "images/pain_graines.jpg" }
    ],
    patisserie: [
        { nom: "tarte aux fraises", img: "images/fraise.jpg" },
        { nom: "tarte au chocolat", img: "images/chocolat.jpg" },
        { nom: "cookie", img: "images/cookie.jpg" }
    ],
    boisson: [
        { nom: "coca", img: "images/coca.jpg" },
        { nom: "thé", img: "images/the.jpg" },
        { nom: "café", img: "images/cafe.jpg" }
    ]
};

function afficherCategorie(cat) {
    etape = "categorie";
    document.getElementById("menuPrincipal").classList.add("hidden");

    const div = document.getElementById("produits");
    div.innerHTML = "";
    div.classList.remove("hidden");

    data[cat].forEach(produit => {
        div.innerHTML += `
            <div class="carte">
                <img src="${produit.img}">
                <p>${produit.nom}</p>
                <button onclick="reserver('${produit.nom}')">réserver</button>
            </div>
        `;
    });

    document.getElementById("retour").style.display = "block";
}

function reserver(nom) {
    etape = "reservation";
    document.getElementById("produits").classList.add("hidden");

    document.getElementById("reservation").classList.remove("hidden");
    document.getElementById("produitChoisi").innerText = nom;
}

function retour() {
    if (etape === "categorie") {
        document.getElementById("produits").classList.add("hidden");
        document.getElementById("menuPrincipal").classList.remove("hidden");
        document.getElementById("retour").style.display = "none";
        etape = "menu";
    }
    else if (etape === "reservation") {
        document.getElementById("reservation").classList.add("hidden");
        document.getElementById("produits").classList.remove("hidden");
        etape = "categorie";
    }
}

function validerReservation() {
    alert("réservation envoyée !");
}
</script>

</body>
</html>
